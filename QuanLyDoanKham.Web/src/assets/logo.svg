<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer green cross -->
  <path fill="none" stroke="#009A44" stroke-width="18" stroke-linejoin="miter" d="M 60 25 L 140 25 L 140 60 L 175 60 L 175 140 L 140 140 L 140 175 L 60 175 L 60 140 L 25 140 L 25 60 L 60 60 Z" />

  <!-- Red Head -->
  <circle cx="100" cy="46" r="14" fill="#E31837" />

  <!-- Red Heart Body -->
  <path fill="#E31837" d="M 100 70 C 140 50, 160 90, 100 160 C 40 90, 60 50, 100 70 Z" />

  <!-- White Cutout (Inner space of the heart) -->
  <circle cx="100" cy="98" r="28" fill="#ffffff" />

  <!-- Red inner elements ('A' and 'Bowl') -->
  <!-- Bowl: an ellipse -->
  <ellipse cx="100" cy="110" rx="16" ry="8" fill="#E31837" />
  
  <!-- 'A' letter above the bowl -->
  <path d="M 92 98 L 100 80 L 108 98" fill="none" stroke="#E31837" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 94 90 L 106 90" fill="none" stroke="#E31837" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Text "An phúc" -->
  <text x="100" y="225" font-family="'Nunito', 'Segoe UI', 'Arial Rounded MT Bold', sans-serif" font-weight="900" font-size="36" fill="#E31837" text-anchor="middle" letter-spacing="1">An phúc</text>
</svg>
